<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Visit Schedule — Pre Sales</title>
<style>
  :root{--navy:#1F3A5F;--navy2:#16294a;--blue:#2E6CA8;--yellow:#F4C20D;--ink:#1b2230;--muted:#67748a;--line:#dde3ec;--bg:#eef1f6;--card:#fff;--green:#1f7a3f;--greenbg:#e6f3ea;--red:#b3261e;--redbg:#fbeae8;--amber:#9a6200;--amberbg:#fdf2da;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Arial,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}
  header{background:var(--navy);color:#fff;padding:0 20px;display:flex;align-items:center;gap:14px;height:54px;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.2);}
  .logo{width:32px;height:32px;border-radius:8px;background:var(--yellow);color:var(--navy);font-weight:800;display:grid;place-items:center;font-size:14px;flex:0 0 auto;}
  .brand .t{font-size:10px;color:#9fb2cd;letter-spacing:1px;font-weight:700;}
  .brand .h{font-size:14px;font-weight:700;}
  .hdr-right{margin-left:auto;display:flex;align-items:center;gap:12px;}
  .user-pill{font-size:12.5px;color:#cdd8e8;}
  .signout-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#cdd8e8;border-radius:7px;padding:5px 11px;font-size:12px;font-weight:700;cursor:pointer;}

  .controls{background:#fff;border-bottom:1px solid var(--line);padding:14px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .store-select{padding:9px 12px;border:2px solid var(--line);border-radius:9px;font-size:14px;color:var(--ink);background:#fff;min-width:220px;}
  .store-select:focus{outline:none;border-color:var(--blue);}
  .day-nav{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;}
  .day-chip{flex:0 0 auto;padding:7px 14px;border-radius:20px;font-size:12.5px;font-weight:700;cursor:pointer;border:2px solid var(--line);background:#fff;color:var(--muted);white-space:nowrap;}
  .day-chip.active{background:var(--navy);color:#fff;border-color:var(--navy);}
  .day-chip:hover:not(.active){border-color:var(--blue);color:var(--blue);}

  .main{padding:20px;}
  .slot-grid{display:grid;gap:10px;}
  .slot-row{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:14px;}
  .slot-time{font-size:13.5px;font-weight:800;color:var(--ink);min-width:120px;}
  .slot-bar{flex:1;height:8px;border-radius:4px;background:var(--line);overflow:hidden;}
  .slot-bar-fill{height:100%;border-radius:4px;transition:width .3s;}
  .slot-count{font-size:13px;font-weight:700;min-width:80px;text-align:right;}
  .badge{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:800;border-radius:20px;padding:4px 10px;white-space:nowrap;}
  .bg-green{background:var(--greenbg);color:var(--green);}
  .bg-orange{background:var(--amberbg);color:var(--amber);}
  .bg-red{background:var(--redbg);color:var(--red);}
  .bg-grey{background:#eef1f6;color:var(--muted);}

  .empty{text-align:center;padding:60px 20px;color:var(--muted);}
  .empty .e-ico{font-size:40px;margin-bottom:12px;}
  .empty .e-msg{font-size:15px;font-weight:700;}
  .empty .e-sub{font-size:13px;margin-top:6px;}
  .loading{text-align:center;padding:60px;color:var(--muted);}
  .spinner{display:inline-block;width:22px;height:22px;border:2px solid rgba(31,58,95,.15);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}

  .legend{display:flex;gap:14px;align-items:center;font-size:12px;color:var(--muted);margin-left:auto;}
  .legend-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:4px;}
</style>
</head>
<body>
<header>
  <div class="logo">VS</div>
  <div class="brand"><div class="t">MATERIAL DEPOT</div><div class="h">Visit Schedule</div></div>
  <div class="hdr-right">
    <span class="user-pill" id="userPill"></span>
    <button class="signout-btn" onclick="signOut()">Sign out</button>
  </div>
</header>

<div class="controls">
  <select class="store-select" id="storeSelect" onchange="onStoreChange(this.value)">
    <option value="">Select a store…</option>
  </select>
  <div class="day-nav" id="dayNav"></div>
  <div class="legend">
    <span><span class="legend-dot" style="background:var(--green)"></span>Free</span>
    <span><span class="legend-dot" style="background:var(--amber)"></span>Busy</span>
    <span><span class="legend-dot" style="background:var(--red)"></span>Full</span>
  </div>
</div>

<div class="main" id="main">
  <div class="empty">
    <div class="e-ico">&#128202;</div>
    <div class="e-msg">Select a store to view slot capacity</div>
    <div class="e-sub">Slots are colour-coded by visit load vs BM availability.</div>
  </div>
</div>

<script>
const SB_URL='https://dzilftvisjgckmefpzxk.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6aWxmdHZpc2pnY2ttZWZwenhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2Njg0MTksImV4cCI6MjA5NzI0NDQxOX0.O-ZzJBs7TYEmXvVDf_7y70-skwSh7Ve4DuM-kBfXjP0';
const SESSION_KEY='vs_user';
const SB_H={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};

async function sbGet(q){const r=await fetch(SB_URL+'/rest/v1/'+q,{headers:SB_H});return r.json();}

let SESSION=null;
let selectedStore=null;
let selectedDay=dateStr(0);
let pollTm=null;

function getSession(){
  const s=JSON.parse(localStorage.getItem(SESSION_KEY)||'null');
  if(!s||s.role!=='pre_sales'){window.location.href='Login.html';return null;}
  return s;
}
function signOut(){localStorage.removeItem(SESSION_KEY);window.location.href='Login.html';}

function dateStr(offsetDays){
  const d=new Date();d.setDate(d.getDate()+offsetDays);
  return d.toISOString().slice(0,10);
}
function fmtDay(d,i){
  const dt=new Date(d+'T00:00:00');
  const label=i===0?'Today':dt.toLocaleDateString('en-IN',{weekday:'short'});
  const num=dt.getDate();
  return label+' '+num;
}

function buildDayNav(){
  const nav=document.getElementById('dayNav');
  nav.innerHTML=Array.from({length:7},(_,i)=>{
    const d=dateStr(i);
    return '<div class="day-chip'+(d===selectedDay?' active':'')+'" onclick="selectDay(\''+d+'\')">'+(fmtDay(d,i))+'</div>';
  }).join('');
}

function selectDay(d){
  selectedDay=d;
  buildDayNav();
  if(selectedStore)loadSlots();
}

async function loadStores(){
  const stores=await sbGet('stores?select=id,name,bm_count,footfall_data&order=name.asc');
  const sel=document.getElementById('storeSelect');
  if(!Array.isArray(stores)||!stores.length){
    sel.innerHTML='<option value="">No stores set up yet</option>';
    return;
  }
  sel.innerHTML='<option value="">Select a store…</option>'+
    stores.map(s=>'<option value="'+s.id+'" data-bm="'+s.bm_count+'" data-ff="'+encodeURIComponent(JSON.stringify(s.footfall_data||{}))+'">'+s.name+'</option>').join('');
}

function onStoreChange(storeId){
  const sel=document.getElementById('storeSelect');
  const opt=sel.options[sel.selectedIndex];
  if(!storeId){selectedStore=null;document.getElementById('main').innerHTML='<div class="empty"><div class="e-ico">&#128202;</div><div class="e-msg">Select a store to view slot capacity</div></div>';return;}
  selectedStore={
    id:storeId,
    bm_count:parseInt(opt.dataset.bm)||1,
    footfall_data:JSON.parse(decodeURIComponent(opt.dataset.ff||'{}'))
  };
  loadSlots();
  clearInterval(pollTm);
  pollTm=setInterval(loadSlots,60000);
}

const SLOTS=[
  {hour:9,label:'9 AM – 10 AM'},{hour:10,label:'10 AM – 11 AM'},{hour:11,label:'11 AM – 12 PM'},
  {hour:12,label:'12 PM – 1 PM'},{hour:13,label:'1 PM – 2 PM'},{hour:14,label:'2 PM – 3 PM'},
  {hour:15,label:'3 PM – 4 PM'},{hour:16,label:'4 PM – 5 PM'},{hour:17,label:'5 PM – 6 PM'},
  {hour:18,label:'6 PM – 7 PM'},{hour:19,label:'7 PM – 8 PM'}
];

async function loadSlots(){
  if(!selectedStore)return;
  document.getElementById('main').innerHTML='<div class="loading"><span class="spinner"></span></div>';
  const visits=await sbGet('store_visits?store_id=eq.'+selectedStore.id+'&visit_date=eq.'+selectedDay+'&select=visit_time,visit_status&visit_status=neq.completed');
  const vArr=Array.isArray(visits)?visits:[];
  const counts={};
  vArr.forEach(v=>{
    const h=parseInt((v.visit_time||'').split(':')[0]);
    if(h>=9&&h<=19)counts[h]=(counts[h]||0)+1;
  });
  const bmCount=selectedStore.bm_count||1;
  const ff=selectedStore.footfall_data||{};
  const rows=SLOTS.map(s=>{
    const scheduled=counts[s.hour]||0;
    const footfall=ff[s.hour]||ff[String(s.hour)]||0;
    const load=(scheduled+footfall)/bmCount;
    const pct=Math.min(100,Math.round(load*100));
    let cls,label,barColor;
    if(load<0.5){cls='bg-green';label='Free';barColor='var(--green)';}
    else if(load<0.8){cls='bg-orange';label='Busy';barColor='var(--amber)';}
    else{cls='bg-red';label='Full';barColor='var(--red)';}
    return '<div class="slot-row">'+
      '<div class="slot-time">'+s.label+'</div>'+
      '<div style="flex:1;display:flex;align-items:center;gap:10px">'+
        '<div class="slot-bar"><div class="slot-bar-fill" style="width:'+pct+'%;background:'+barColor+'"></div></div>'+
        '<span class="badge '+cls+'">'+label+'</span>'+
      '</div>'+
      '<div class="slot-count" style="color:var(--muted)">'+scheduled+' visit'+(scheduled===1?'':'s')+'</div>'+
    '</div>';
  }).join('');
  document.getElementById('main').innerHTML='<div class="slot-grid">'+rows+'</div>';
}

SESSION=getSession();
if(SESSION){
  document.getElementById('userPill').textContent=SESSION.name;
  buildDayNav();
  loadStores();
}
</script>
</body>
</html>
