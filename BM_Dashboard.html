<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>Visit Schedule — BM</title>
<style>
  :root{--navy:#1F3A5F;--navy2:#16294a;--blue:#2E6CA8;--yellow:#F4C20D;--ink:#1b2230;--muted:#67748a;--line:#dde3ec;--bg:#eef1f6;--card:#fff;--green:#1f7a3f;--greenbg:#e6f3ea;--red:#b3261e;--redbg:#fbeae8;--amber:#9a6200;--amberbg:#fdf2da;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Arial,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}
  header{background:var(--navy);color:#fff;padding:0 16px;display:flex;align-items:center;gap:12px;height:52px;position:sticky;top:0;z-index:50;}
  .logo{width:30px;height:30px;border-radius:7px;background:var(--yellow);color:var(--navy);font-weight:800;display:grid;place-items:center;font-size:13px;flex:0 0 auto;}
  .hdr-title{font-size:15px;font-weight:800;}
  .hdr-sub{font-size:11px;color:#9fb2cd;}
  .hdr-right{margin-left:auto;display:flex;gap:8px;align-items:center;}
  .signout-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#cdd8e8;border-radius:7px;padding:5px 10px;font-size:12px;font-weight:700;cursor:pointer;}
  .free-btn{background:var(--green);color:#fff;border:0;border-radius:7px;padding:5px 12px;font-size:12px;font-weight:800;cursor:pointer;}
  .free-btn.engaged{background:var(--red);}

  .status-bar{background:#fff;border-bottom:1px solid var(--line);padding:10px 16px;display:flex;align-items:center;gap:10px;}
  .my-status{font-size:13px;font-weight:700;}
  .status-chip{display:inline-flex;align-items:center;font-size:12px;font-weight:800;border-radius:20px;padding:3px 10px;}
  .bs-free{background:var(--greenbg);color:var(--green);}
  .bs-engaged{background:var(--redbg);color:var(--red);}
  .bs-potentially_available{background:var(--amberbg);color:var(--amber);}

  .main{padding:14px;}
  .section-label{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin:16px 0 8px;}

  .client-card{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden;}
  .cc-head{padding:14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
  .cc-name{font-size:15px;font-weight:800;}
  .cc-phone{font-size:12.5px;color:var(--muted);margin-top:2px;}
  .cc-time{font-size:12.5px;font-weight:700;color:var(--navy);background:#eef3fb;border-radius:7px;padding:4px 9px;}
  .cc-body{padding:14px;border-top:1px solid var(--line);background:#fafbfc;}
  .cc-body.hidden{display:none;}

  .form-group{margin-bottom:14px;}
  .form-group label{display:block;font-size:11px;font-weight:800;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.3px;}
  .form-group select,.form-group textarea{width:100%;padding:10px 12px;border:2px solid var(--line);border-radius:9px;font-size:14px;color:var(--ink);background:#fff;}
  .form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--blue);}
  .form-group textarea{min-height:80px;resize:vertical;}
  .save-btn{width:100%;border:0;border-radius:10px;padding:13px;font-size:15px;font-weight:800;cursor:pointer;background:var(--navy);color:#fff;margin-top:4px;}
  .save-btn:disabled{opacity:.45;cursor:not-allowed;}

  .chip{display:inline-flex;align-items:center;font-size:11.5px;font-weight:800;border-radius:20px;padding:3px 10px;}
  .c-scheduled{background:#eef1f6;color:var(--muted);}
  .c-arrived{background:var(--greenbg);color:var(--green);}
  .c-bm_assigned{background:#e4f0fb;color:var(--blue);}
  .c-completed{background:var(--greenbg);color:var(--green);}

  .empty{text-align:center;padding:60px 16px;color:var(--muted);}
  .empty .e-ico{font-size:40px;margin-bottom:12px;}
  .empty .e-msg{font-size:14px;font-weight:700;}
  .empty .e-sub{font-size:13px;margin-top:6px;}
  .loading{text-align:center;padding:60px;color:var(--muted);}
  .spinner{display:inline-block;width:20px;height:20px;border:2px solid rgba(31,58,95,.15);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;border-radius:10px;padding:10px 18px;font-size:13.5px;font-weight:600;opacity:0;transition:all .25s;pointer-events:none;z-index:200;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<header>
  <div class="logo">VS</div>
  <div><div class="hdr-title">BM Dashboard</div><div class="hdr-sub" id="userPill"></div></div>
  <div class="hdr-right">
    <button class="free-btn" id="freeBtn" onclick="toggleFree()">Mark Free</button>
    <button class="signout-btn" onclick="signOut()">Sign out</button>
  </div>
</header>

<div class="status-bar">
  <span class="my-status">My status:</span>
  <span class="status-chip bs-free" id="myStatusChip">Free</span>
  <span style="font-size:12px;color:var(--muted);margin-left:4px" id="activeCount"></span>
</div>

<div class="main" id="main">
  <div class="loading"><span class="spinner"></span></div>
</div>

<div id="toast"></div>

<script>
const SB_URL='https://dzilftvisjgckmefpzxk.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6aWxmdHZpc2pnY2ttZWZwenhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2Njg0MTksImV4cCI6MjA5NzI0NDQxOX0.O-ZzJBs7TYEmXvVDf_7y70-skwSh7Ve4DuM-kBfXjP0';
const SESSION_KEY='vs_user';
const SB_H={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'};

async function sbGet(q){const r=await fetch(SB_URL+'/rest/v1/'+q,{headers:SB_H});return r.json();}
async function sbPatch(t,id,b){const r=await fetch(SB_URL+'/rest/v1/'+t+'?id=eq.'+id,{method:'PATCH',headers:SB_H,body:JSON.stringify(b)});if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.message||'Save failed ('+r.status+')');}return r.json();}
async function sbPost(t,b){const r=await fetch(SB_URL+'/rest/v1/'+t,{method:'POST',headers:SB_H,body:JSON.stringify(b)});if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.message||'Save failed ('+r.status+')');}return r.json();}

let SESSION=null;
let myProfile=null;
let myStatus=null;
let assignments=[];
let expandedId=null;
let pollTm=null;

function getSession(){
  const s=JSON.parse(localStorage.getItem(SESSION_KEY)||'null');
  if(!s||s.role!=='store_bm'){window.location.href='Login.html';return null;}
  return s;
}
function signOut(){localStorage.removeItem(SESSION_KEY);window.location.href='Login.html';}

let toastTm=null;
function toast(msg,err=false){
  const t=document.getElementById('toast');t.textContent=msg;
  t.style.background=err?'var(--red)':'var(--ink)';
  t.classList.add('show');clearTimeout(toastTm);toastTm=setTimeout(()=>t.classList.remove('show'),2500);
}

function fmtTime(t){if(!t)return '';const[h,m]=t.split(':').map(Number);const ap=h>=12?'PM':'AM';return (h%12||12)+':'+(m<10?'0'+m:m)+' '+ap;}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function today(){return new Date().toISOString().slice(0,10);}

async function loadData(){
  const [prof,statusRes]=await Promise.all([
    sbGet('profiles?id=eq.'+myProfile.id+'&select=id'),
    sbGet('bm_status?bm_id=eq.'+myProfile.id+'&select=*')
  ]);
  myStatus=Array.isArray(statusRes)&&statusRes.length?statusRes[0]:null;
  updateStatusUI();

  const assigned=await sbGet('visit_assignments?bm_id=eq.'+myProfile.id+'&select=visit_id');
  const visitIds=Array.isArray(assigned)?assigned.map(a=>a.visit_id):[];
  if(!visitIds.length){assignments=[];renderClients();return;}
  const visits=await sbGet('store_visits?id=in.('+visitIds.join(',')+')'+'&visit_date=eq.'+today()+'&visit_status=neq.completed&select=*&order=visit_time.asc');
  assignments=Array.isArray(visits)?visits:[];
  renderClients();
}

function updateStatusUI(){
  const st=myStatus?myStatus.status:'free';
  const chip=document.getElementById('myStatusChip');
  chip.className='status-chip bs-'+st;
  chip.textContent={'free':'Free','engaged':'Engaged','potentially_available':'P. Available'}[st]||'Free';
  const cnt=myStatus?myStatus.active_client_count||0:0;
  document.getElementById('activeCount').textContent=cnt>0?cnt+' active client'+(cnt===1?'':'s'):'';
  const btn=document.getElementById('freeBtn');
  btn.textContent=st==='free'?'I\'m Free':'Mark Free';
  btn.className='free-btn'+(st!=='free'?' engaged':'');
}

async function toggleFree(){
  const st=myStatus?myStatus.status:'free';
  if(st==='free'){toast('You\'re already free!');return;}
  const btn=document.getElementById('freeBtn');
  btn.disabled=true;
  try{
    if(myStatus){
      await sbPatch('bm_status',myStatus.id,{status:'free',active_client_count:0,updated_at:new Date().toISOString()});
    }else{
      await sbPost('bm_status',{bm_id:myProfile.id,store_id:SESSION.store_id,status:'free',active_client_count:0});
    }
    toast('Marked as free');
    loadData();
  }catch(e){
    toast('Failed to update status — try again',true);
  }finally{
    btn.disabled=false;
  }
}

function renderClients(){
  if(!assignments.length){
    document.getElementById('main').innerHTML='<div class="empty"><div class="e-ico">&#129309;</div><div class="e-msg">No clients assigned yet</div><div class="e-sub">The receptionist will assign clients as they arrive.</div></div>';
    return;
  }
  document.getElementById('main').innerHTML='<div class="section-label">Assigned Clients ('+assignments.length+')</div>'+
    assignments.map(v=>{
      const isOpen=expandedId===v.id;
      const statusLabel={scheduled:'Scheduled',arrived:'Arrived',bm_assigned:'Assigned',completed:'Completed'}[v.visit_status]||v.visit_status;
      return '<div class="client-card">'+
        '<div class="cc-head" onclick="toggleCard(\''+v.id+'\')">'+
          '<div>'+
            '<div class="cc-name">'+esc(v.customer_name)+'</div>'+
            '<div class="cc-phone">'+esc(v.phone||'')+'</div>'+
          '</div>'+
          '<div style="text-align:right">'+
            '<div class="cc-time">'+fmtTime(v.visit_time)+'</div>'+
            '<div style="margin-top:4px"><span class="chip c-'+v.visit_status+'">'+statusLabel+'</span></div>'+
          '</div>'+
        '</div>'+
        '<div class="cc-body'+(isOpen?'':' hidden')+'" id="body_'+v.id+'">'+
          '<div class="form-group">'+
            '<label>House Stage</label>'+
            '<select id="hs_'+v.id+'" onchange="">'+
              '<option value="">Select…</option>'+
              ['Under Construction','Ready to Move','Renovation','New Build — Bare Shell'].map(opt=>
                '<option value="'+esc(opt)+'"'+(v.house_stage===opt?' selected':'')+'>'+esc(opt)+'</option>'
              ).join('')+
            '</select>'+
          '</div>'+
          '<div class="form-group">'+
            '<label>Visit Notes</label>'+
            '<textarea id="notes_'+v.id+'" placeholder="Requirements, budget discussed, preferences…">'+esc(v.bm_comments||'')+'</textarea>'+
          '</div>'+
          '<div class="form-group">'+
            '<label>Follow-up</label>'+
            '<select id="fu_'+v.id+'">'+
              ['No follow-up','Call in 2 days','Send quotation'].map(opt=>
                '<option value="'+esc(opt)+'"'+(v.follow_up===opt?' selected':'')+'>'+esc(opt)+'</option>'
              ).join('')+
            '</select>'+
          '</div>'+
          '<button class="save-btn" onclick="saveComments(\''+v.id+'\')">Save &amp; Mark Complete</button>'+
        '</div>'+
      '</div>';
    }).join('');
}

function toggleCard(id){
  expandedId=expandedId===id?null:id;
  renderClients();
}

async function saveComments(visitId){
  const hs=document.getElementById('hs_'+visitId).value;
  const notes=document.getElementById('notes_'+visitId).value.trim();
  const fu=document.getElementById('fu_'+visitId).value;
  const btn=document.querySelector('#body_'+visitId+' .save-btn');
  if(btn){btn.disabled=true;btn.textContent='Saving…';}
  try{
    await sbPatch('store_visits',visitId,{
      house_stage:hs||null,
      bm_comments:notes||null,
      follow_up:fu||null,
      visit_status:'completed',
      updated_at:new Date().toISOString()
    });
    if(myStatus&&myStatus.active_client_count>0){
      const newCount=Math.max(0,myStatus.active_client_count-1);
      await sbPatch('bm_status',myStatus.id,{
        active_client_count:newCount,
        status:newCount===0?'free':myStatus.status,
        updated_at:new Date().toISOString()
      });
    }
    toast('Visit completed & saved');
    expandedId=null;
    loadData();
  }catch(e){
    toast('Failed to save — do not close this page, try again',true);
    if(btn){btn.disabled=false;btn.textContent='Save & Mark Complete';}
  }
}

SESSION=getSession();
if(SESSION){
  document.getElementById('userPill').textContent=SESSION.name;
  sbGet('profiles?email=eq.'+encodeURIComponent(SESSION.email)+'&select=id,name,email').then(r=>{
    if(Array.isArray(r)&&r.length){
      myProfile=r[0];
      loadData();
      pollTm=setInterval(loadData,30000);
    }
  });
}
</script>
</body>
</html>
