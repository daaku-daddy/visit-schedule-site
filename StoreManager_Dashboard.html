<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>Visit Schedule — Store Manager</title>
<style>
:root{--navy:#1F3A5F;--navy2:#16294a;--blue:#2E6CA8;--yellow:#F4C20D;--ink:#1b2230;--muted:#67748a;--line:#dde3ec;--bg:#eef1f6;--card:#fff;--green:#1f7a3f;--greenbg:#e6f3ea;--red:#b3261e;--redbg:#fbeae8;--amber:#9a6200;--amberbg:#fdf2da;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Arial,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}

header{background:var(--navy);color:#fff;padding:0 16px;display:flex;align-items:center;gap:12px;height:52px;position:sticky;top:0;z-index:50;}
.logo{width:30px;height:30px;border-radius:7px;background:var(--yellow);color:var(--navy);font-weight:800;display:grid;place-items:center;font-size:13px;flex:0 0 auto;}
.hdr-title{font-size:15px;font-weight:800;}
.hdr-sub{font-size:11px;color:#9fb2cd;}
.hdr-right{margin-left:auto;}
.signout-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#cdd8e8;border-radius:7px;padding:5px 10px;font-size:12px;font-weight:700;cursor:pointer;}

/* Week at a Glance */
.glance-wrap{background:var(--card);border-bottom:1px solid var(--line);}
.glance-hd{padding:10px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;}
.glance-hd h2{font-size:13px;font-weight:800;color:var(--navy);}
.glance-legend{display:flex;gap:8px;font-size:10.5px;color:var(--muted);}
.glance-legend span{display:flex;align-items:center;gap:3px;}
.ldot{width:6px;height:6px;border-radius:50%;display:inline-block;}

/* Week grid */
.wk-grid{display:grid;grid-template-columns:64px repeat(7,1fr);overflow-x:auto;}
.wk-grid>*:nth-child(8n){border-right:0;}
.wk-grid>*:nth-child(n+25){border-bottom:0;}
.wk-corner{background:#f7f9fc;border-bottom:1px solid var(--line);border-right:1px solid var(--line);}
.wk-day-hd{padding:8px 3px;text-align:center;background:#f7f9fc;border-bottom:1px solid var(--line);border-right:1px solid var(--line);cursor:pointer;transition:background .15s;user-select:none;}
.wk-day-hd:hover:not(.sel){background:#eef3fb;}
.wk-day-hd.sel{background:var(--navy);color:#fff;}
.wk-wd{font-size:8px;font-weight:800;opacity:.65;letter-spacing:.5px;text-transform:uppercase;}
.wk-num{font-size:15px;font-weight:900;line-height:1.1;margin-top:1px;}
.wk-day-hd.sel .wk-wd{opacity:.6;}
.wk-band-lbl{padding:6px 8px;background:#f7f9fc;border-right:1px solid var(--line);border-bottom:1px solid var(--line);display:flex;flex-direction:column;justify-content:center;}
.wk-bl-name{font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.wk-bl-sub{font-size:8px;color:var(--muted);margin-top:1px;opacity:.7;}
.wk-cell{padding:4px 2px;text-align:center;cursor:pointer;border-right:1px solid var(--line);border-bottom:1px solid var(--line);transition:filter .12s;user-select:none;}
.wk-cell:hover{filter:brightness(.93);}
.wk-cell.sel{box-shadow:inset 0 0 0 2px var(--navy);}
.wk-inner{border-radius:7px;padding:5px 2px;font-size:13px;font-weight:800;line-height:1;min-height:38px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.wk-inner .wi-n{font-size:13px;font-weight:900;}
.wg-green{background:var(--greenbg);color:var(--green);}
.wg-orange{background:var(--amberbg);color:var(--amber);}
.wg-red{background:var(--redbg);color:var(--red);}
.wg-muted{background:#eef1f6;color:var(--muted);}

/* Tabs */
.tabs{display:flex;background:#fff;border-bottom:2px solid var(--line);}
.tab{flex:1;text-align:center;padding:12px;font-size:13.5px;font-weight:700;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;}
.tab.active{color:var(--navy);border-bottom-color:var(--navy);}

.main{padding:14px;}
.section-label{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin:16px 0 8px;display:flex;align-items:center;gap:6px;}
.section-label:first-child{margin-top:0;}
.section-dot{width:6px;height:6px;border-radius:50%;display:inline-block;}

/* Visit cards */
.visit-card{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden;}
.vc-stripe{height:3px;}
.vc-body{padding:14px;}
.vc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;}
.vc-name{font-size:15px;font-weight:800;}
.vc-phone{font-size:12.5px;color:var(--muted);margin-top:2px;}
.vc-time{font-size:12.5px;font-weight:700;color:var(--navy);background:#eef3fb;border-radius:7px;padding:4px 9px;white-space:nowrap;}
.vc-cats{font-size:12px;color:var(--muted);margin-bottom:6px;}
.vc-notes{font-size:12px;color:var(--muted);font-style:italic;margin-bottom:8px;}
.vc-footer{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.avail-chip{display:inline-flex;align-items:center;font-size:11.5px;font-weight:800;border-radius:20px;padding:3px 10px;}
.av-none{background:#eef1f6;color:var(--muted);}
.av-available{background:var(--greenbg);color:var(--green);}
.av-partial{background:var(--amberbg);color:var(--amber);}
.av-unavailable{background:var(--redbg);color:var(--red);}
.av-notes{font-size:11px;color:var(--muted);font-style:italic;margin-top:4px;}
.btn-sm{background:var(--navy);color:#fff;border:0;border-radius:8px;padding:7px 14px;font-size:12.5px;font-weight:700;cursor:pointer;}
.btn-sm.outline{background:transparent;border:1px solid var(--line);color:var(--muted);}

/* BM cards (team tab) */
.bm-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
.bm-av{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;font-weight:800;font-size:14px;color:#fff;flex:0 0 auto;}
.bm-name{font-size:14px;font-weight:800;}
.bm-email{font-size:12px;color:var(--muted);}
.bm-right{margin-left:auto;}
.btn-remove{background:transparent;border:1px solid var(--line);color:var(--red);border-radius:7px;padding:5px 10px;font-size:12px;font-weight:700;cursor:pointer;}
.btn-remove:hover{background:var(--redbg);}

/* Add BM */
.add-bm-wrap{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:10px;}
.add-bm-wrap input{width:100%;padding:10px 12px;border:2px solid var(--line);border-radius:9px;font-size:14px;margin-bottom:10px;}
.add-bm-wrap input:last-of-type{margin-bottom:0;}
.add-bm-wrap input:focus{outline:none;border-color:var(--blue);}
.form-err{background:var(--redbg);color:var(--red);border-radius:8px;padding:8px 12px;font-size:12.5px;font-weight:600;margin-bottom:8px;display:none;}
.form-err.show{display:block;}

/* Availability sheet */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:none;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.sheet{background:#fff;border-radius:18px 18px 0 0;width:100%;max-width:520px;padding:20px;max-height:80vh;overflow-y:auto;}
.sheet h3{font-size:16px;font-weight:800;color:var(--navy);margin-bottom:4px;}
.sheet .sub{font-size:13px;color:var(--muted);margin-bottom:16px;}
.avail-opts{display:grid;gap:10px;margin-bottom:16px;}
.avail-opt{border:2px solid var(--line);border-radius:10px;padding:12px 14px;cursor:pointer;font-weight:700;transition:all .12s;}
.avail-opt .av-sub{font-size:12px;color:var(--muted);font-weight:500;margin-top:2px;}
.avail-opt.sel-available{border-color:var(--green);background:var(--greenbg);color:var(--green);}
.avail-opt.sel-partial{border-color:var(--amber);background:var(--amberbg);color:var(--amber);}
.avail-opt.sel-unavailable{border-color:var(--red);background:var(--redbg);color:var(--red);}
.notes-input{width:100%;padding:10px 12px;border:2px solid var(--line);border-radius:9px;font-size:14px;min-height:70px;resize:vertical;margin-bottom:12px;}
.notes-input:focus{outline:none;border-color:var(--blue);}
.sheet-actions{display:flex;gap:10px;}
.btn-full{flex:1;border:0;border-radius:10px;padding:13px;font-size:15px;font-weight:800;cursor:pointer;background:var(--navy);color:#fff;}
.btn-cancel-full{flex:1;border:1px solid var(--line);border-radius:10px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;background:#fff;color:var(--ink);}

/* Empty / loading */
.empty{text-align:center;padding:48px 16px;color:var(--muted);}
.empty .e-ico{font-size:36px;margin-bottom:10px;}
.empty .e-msg{font-size:14px;font-weight:700;}
.loading{text-align:center;padding:60px;color:var(--muted);}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid rgba(31,58,95,.15);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;border-radius:10px;padding:10px 18px;font-size:13.5px;font-weight:600;opacity:0;transition:all .25s;pointer-events:none;z-index:200;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<header>
  <div class="logo">VS</div>
  <div>
    <div class="hdr-title" id="storeName">Visit Schedule</div>
    <div class="hdr-sub" id="userPill"></div>
  </div>
  <div class="hdr-right"><button class="signout-btn" onclick="signOut()">Sign out</button></div>
</header>

<!-- Week at a Glance (hidden until data loads) -->
<div class="glance-wrap" id="glanceWrap" style="display:none">
  <div class="glance-hd">
    <h2>Week at a Glance</h2>
    <div class="glance-legend">
      <span><span class="ldot" style="background:var(--green)"></span>Free</span>
      <span><span class="ldot" style="background:var(--amber)"></span>Busy</span>
      <span><span class="ldot" style="background:var(--red)"></span>Full</span>
    </div>
  </div>
  <div class="wk-grid" id="weekGrid"></div>
</div>

<!-- Tabs (hidden until data loads) -->
<div class="tabs" id="tabsRow" style="display:none">
  <div class="tab active" id="tabVisits" onclick="switchTab('visits')">&#128197; Visits</div>
  <div class="tab" id="tabTeam" onclick="switchTab('team')">&#128100; My Team</div>
</div>

<div class="main" id="main"><div class="loading"><span class="spinner"></span></div></div>

<!-- Availability Sheet -->
<div class="overlay" id="availOverlay">
  <div class="sheet">
    <h3>Set Availability</h3>
    <p class="sub" id="availVisitName"></p>
    <div class="avail-opts">
      <div class="avail-opt" id="optAvailable" onclick="selectAvail('available')">
        Available <div class="av-sub">Store is ready for this visit</div>
      </div>
      <div class="avail-opt" id="optPartial" onclick="selectAvail('partial')">
        Partially Available <div class="av-sub">Limited capacity or resources</div>
      </div>
      <div class="avail-opt" id="optUnavailable" onclick="selectAvail('unavailable')">
        Unavailable <div class="av-sub">Cannot accommodate this visit</div>
      </div>
    </div>
    <textarea class="notes-input" id="availNotes" placeholder="Optional notes for the team&#8230;"></textarea>
    <div class="sheet-actions">
      <button class="btn-cancel-full" onclick="closeSheet()">Cancel</button>
      <button class="btn-full" id="availSaveBtn" onclick="saveAvail()">Save</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── Config ──────────────────────────────────────────────────────
const DUMMY_MODE=false;
const SB_URL='https://dzilftvisjgckmefpzxk.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6aWxmdHZpc2pnY2ttZWZwenhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2Njg0MTksImV4cCI6MjA5NzI0NDQxOX0.O-ZzJBs7TYEmXvVDf_7y70-skwSh7Ve4DuM-kBfXjP0';
const SESSION_KEY='vs_user';
const SB_H={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'};

async function sbGet(q){const r=await fetch(SB_URL+'/rest/v1/'+q,{headers:SB_H});return r.json();}
async function sbPost(t,b){const r=await fetch(SB_URL+'/rest/v1/'+t,{method:'POST',headers:SB_H,body:JSON.stringify(b)});if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.message||'Save failed ('+r.status+')');}return r.json();}
async function sbPatch(t,id,b){const r=await fetch(SB_URL+'/rest/v1/'+t+'?id=eq.'+id,{method:'PATCH',headers:SB_H,body:JSON.stringify(b)});if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.message||'Save failed ('+r.status+')');}return r.json();}
async function sbDel(t,id){const r=await fetch(SB_URL+'/rest/v1/'+t+'?id=eq.'+id,{method:'DELETE',headers:SB_H});if(!r.ok)throw new Error('Delete failed ('+r.status+')');return true;}

// ── Constants ────────────────────────────────────────────────────
const BANDS={
  morning:{label:'Morning',sub:'10 AM – 12 PM',hours:[10,11]},
  afternoon:{label:'Afternoon',sub:'12 PM – 5 PM',hours:[12,13,14,15,16]},
  evening:{label:'Evening',sub:'5 PM – 9 PM',hours:[17,18,19,20]}
};
const BAND_KEYS=['morning','afternoon','evening'];

// ── State ────────────────────────────────────────────────────────
let SESSION=null,TAB='visits';
let storeRecord=null,holidaySet=new Set();
let weekVisits=[],dayVisits=[],teamBMs=[];
let selectedDay='',editingVisitId=null,selectedAvailStatus=null,pollTm=null;

// ── Utils ────────────────────────────────────────────────────────
function dateStr(offset){const d=new Date();d.setDate(d.getDate()+offset);return d.toLocaleDateString('en-CA');}
function fmtTime(t){if(!t)return '';const[h,m]=t.split(':').map(Number);return (h%12||12)+':'+(m<10?'0'+m:m)+' '+(h>=12?'PM':'AM');}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
const AV_COLORS=['#5b3aa6','#2E6CA8','#1f7a3f','#9a6200','#1F3A5F'];
function avColor(n){return AV_COLORS[(n||'?').charCodeAt(0)%AV_COLORS.length];}
function initials(n){const p=(n||'?').trim().split(' ');return p.length>=2?p[0][0]+p[p.length-1][0]:p[0].slice(0,2).toUpperCase();}
function availColor(status){return {available:'var(--green)',partial:'var(--amber)',unavailable:'var(--red)'}[status]||'#dde3ec';}
function isWeekendOrHoliday(d){const dow=new Date(d+'T00:00:00').getDay();return dow===0||dow===6||holidaySet.has(d);}
function fmtDay(d){const dt=new Date(d+'T00:00:00');return{wd:dt.toLocaleDateString('en-IN',{weekday:'short'}),day:dt.getDate()};}

// ── Auth ─────────────────────────────────────────────────────────
function getSession(){
  const s=JSON.parse(localStorage.getItem(SESSION_KEY)||'null');
  if(!s||s.role!=='store_manager'){window.location.href='Login.html';return null;}
  return s;
}
function signOut(){localStorage.removeItem(SESSION_KEY);window.location.href='Login.html';}

let toastTm=null;
function toast(msg,err=false){
  const t=document.getElementById('toast');t.textContent=msg;
  t.style.background=err?'var(--red)':'var(--ink)';
  t.classList.add('show');clearTimeout(toastTm);
  toastTm=setTimeout(()=>t.classList.remove('show'),2500);
}
function closeSheet(){document.getElementById('availOverlay').classList.remove('open');}

// ── Band load (for Week at a Glance) ─────────────────────────────
function bandLoad(bandKey,dayStr,store,visits){
  const band=BANDS[bandKey];
  if(!store||!band)return{cls:'wg-muted',count:0};
  const ff=store.footfall_data||{};
  const ffSet=isWeekendOrHoliday(dayStr)?(ff.weekend||ff):(ff.weekday||ff);
  const bm=store.bm_count||1;
  const dv=visits.filter(v=>v.visit_date===dayStr&&v.visit_status!=='completed');
  let totalLoad=0,count=0;
  band.hours.forEach(h=>{
    const s=dv.filter(v=>parseInt((v.visit_time||'').split(':')[0])===h).length;
    const f=ffSet[h]||ffSet[String(h)]||0;
    totalLoad+=(s+f)/bm;
    count+=s;
  });
  const avg=totalLoad/band.hours.length;
  return{cls:avg<0.5?'wg-green':avg<0.8?'wg-orange':'wg-red',count};
}

// ── Tab switching ─────────────────────────────────────────────────
function switchTab(t){
  TAB=t;
  document.getElementById('tabVisits').classList.toggle('active',t==='visits');
  document.getElementById('tabTeam').classList.toggle('active',t==='team');
  if(t==='visits'){
    setDay(selectedDay);
  }else{
    loadTeam();
  }
}

// ── Day selection ─────────────────────────────────────────────────
function setDay(d){
  selectedDay=d;
  dayVisits=weekVisits.filter(v=>v.visit_date===d);
  renderGlance();
  renderVisits();
}

// ── Load all data ─────────────────────────────────────────────────
async function loadData(){
  const storeId=SESSION.store_id;
  const from=dateStr(0),to=dateStr(6);
  try{
    const[storeRes,hlRes,visitsRes]=await Promise.all([
      sbGet('stores?id=eq.'+storeId+'&select=id,name,bm_count,footfall_data'),
      sbGet('public_holidays?select=date'),
      sbGet('store_visits?store_id=eq.'+storeId+'&visit_date=gte.'+from+'&visit_date=lte.'+to+'&order=visit_date.asc,visit_time.asc&select=*')
    ]);
    if(Array.isArray(storeRes)&&storeRes.length){
      storeRecord=storeRes[0];
      document.getElementById('storeName').textContent=storeRecord.name;
    }
    holidaySet=new Set(Array.isArray(hlRes)?hlRes.map(h=>h.date):[]);
    weekVisits=Array.isArray(visitsRes)?visitsRes:[];
  }catch(e){
    console.error('loadData error',e);
    weekVisits=[];
  }
  // Show glance + tabs now that we have data
  document.getElementById('glanceWrap').style.display='block';
  document.getElementById('tabsRow').style.display='flex';
  setDay(selectedDay||dateStr(0));
  clearInterval(pollTm);
  pollTm=setInterval(loadData,30000);
}

// ── Render Week at a Glance ───────────────────────────────────────
function renderGlance(){
  const days=Array.from({length:7},(_,i)=>({d:dateStr(i),i}));
  let html='';

  // Corner + day headers
  html+='<div class="wk-corner"></div>';
  days.forEach(({d,i})=>{
    const{wd,day}=fmtDay(d);
    const sel=d===selectedDay;
    html+='<div class="wk-day-hd'+(sel?' sel':'')+'" onclick="setDay(\''+d+'\')">'
      +'<div class="wk-wd">'+(i===0?'TODAY':wd.toUpperCase())+'</div>'
      +'<div class="wk-num">'+day+'</div>'
      +'</div>';
  });

  // Band rows
  BAND_KEYS.forEach(bk=>{
    const band=BANDS[bk];
    html+='<div class="wk-band-lbl"><span class="wk-bl-name">'+band.label+'</span><span class="wk-bl-sub">'+band.sub+'</span></div>';
    days.forEach(({d})=>{
      const sel=d===selectedDay;
      const{cls,count}=bandLoad(bk,d,storeRecord,weekVisits);
      html+='<div class="wk-cell'+(sel?' sel':'')+'" onclick="setDay(\''+d+'\')">'
        +'<div class="wk-inner '+cls+'">'
        +'<div class="wi-n">'+(count||'—')+'</div>'
        +'</div></div>';
    });
  });

  document.getElementById('weekGrid').innerHTML=html;
}

// ── Render Visits ─────────────────────────────────────────────────
function renderVisits(){
  const dt=new Date(selectedDay+'T00:00:00');
  const isToday=selectedDay===dateStr(0);
  const dayLabel=isToday?'Today':dt.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'short'});
  let html='';
  if(!dayVisits.length){
    html='<div class="empty"><div class="e-ico">&#128197;</div><div class="e-msg">No visits on '+esc(dayLabel)+'</div></div>';
  }else{
    html+='<div class="section-label"><span class="section-dot" style="background:var(--navy)"></span>'+esc(dayLabel)+' &mdash; '+dayVisits.length+' visit'+(dayVisits.length===1?'':'s')+'</div>';
    html+=dayVisits.map(visitCard).join('');
  }
  document.getElementById('main').innerHTML=html;
}

function visitCard(v){
  const avClass={available:'av-available',partial:'av-partial',unavailable:'av-unavailable'}[v.availability_status]||'av-none';
  const avLabel={available:'Available',partial:'Partial',unavailable:'Unavailable'}[v.availability_status]||'Availability pending';
  const stripeColor=availColor(v.availability_status);
  const cats=Array.isArray(v.categories)&&v.categories.length?v.categories.join(', '):'';
  return '<div class="visit-card">'
    +'<div class="vc-stripe" style="background:'+stripeColor+'"></div>'
    +'<div class="vc-body">'
      +'<div class="vc-top">'
        +'<div><div class="vc-name">'+esc(v.customer_name)+'</div><div class="vc-phone">'+esc(v.phone||'')+'</div></div>'
        +'<div class="vc-time">'+fmtTime(v.visit_time)+'</div>'
      +'</div>'
      +(cats?'<div class="vc-cats">'+esc(cats)+'</div>':'')
      +(v.presales_notes?'<div class="vc-notes">'+esc(v.presales_notes)+'</div>':'')
      +'<div class="vc-footer">'
        +'<div>'
          +'<span class="avail-chip '+avClass+'">'+avLabel+'</span>'
          +(v.availability_notes?'<div class="av-notes">'+esc(v.availability_notes)+'</div>':'')
        +'</div>'
        +'<button class="btn-sm" onclick="openAvail(\''+v.id+'\')">Set Availability</button>'
      +'</div>'
    +'</div>'
  +'</div>';
}

function openAvail(id){
  const v=weekVisits.find(x=>x.id===id);
  if(!v)return;
  editingVisitId=id;
  selectedAvailStatus=v.availability_status||null;
  document.getElementById('availVisitName').textContent=v.customer_name+' — '+fmtTime(v.visit_time);
  document.getElementById('availNotes').value=v.availability_notes||'';
  ['available','partial','unavailable'].forEach(s=>{
    document.getElementById('opt'+s.charAt(0).toUpperCase()+s.slice(1)).className='avail-opt'+(selectedAvailStatus===s?' sel-'+s:'');
  });
  document.getElementById('availOverlay').classList.add('open');
}
function selectAvail(s){
  selectedAvailStatus=s;
  ['available','partial','unavailable'].forEach(k=>{
    document.getElementById('opt'+k.charAt(0).toUpperCase()+k.slice(1)).className='avail-opt'+(s===k?' sel-'+k:'');
  });
}

async function saveAvail(){
  if(!selectedAvailStatus){toast('Select an availability option',true);return;}
  const btn=document.getElementById('availSaveBtn');
  if(btn){btn.disabled=true;btn.textContent='Saving…';}
  try{
    await sbPatch('store_visits',editingVisitId,{availability_status:selectedAvailStatus,availability_notes:document.getElementById('availNotes').value.trim()||null,updated_at:new Date().toISOString()});
    toast('Availability saved');
    closeSheet();
    // Update in-memory record so UI reflects immediately
    const v=weekVisits.find(x=>x.id===editingVisitId);
    if(v){v.availability_status=selectedAvailStatus;v.availability_notes=document.getElementById('availNotes').value.trim()||null;}
    dayVisits=weekVisits.filter(x=>x.visit_date===selectedDay);
    renderGlance();
    renderVisits();
  }catch(e){toast('Failed to save — try again',true);}
  finally{if(btn){btn.disabled=false;btn.textContent='Save';}}
}

// ── Team tab ──────────────────────────────────────────────────────
async function loadTeam(){
  clearInterval(pollTm);
  document.getElementById('main').innerHTML='<div class="loading"><span class="spinner"></span></div>';
  const res=await sbGet('profiles?store_id=eq.'+SESSION.store_id+'&role=eq.store_bm&select=*&order=name.asc');
  teamBMs=Array.isArray(res)?res:[];
  renderTeam();
}

function renderTeam(){
  const bmHtml=!teamBMs.length
    ?'<div class="empty"><div class="e-ico">&#128100;</div><div class="e-msg">No BMs added yet</div></div>'
    :teamBMs.map(bm=>'<div class="bm-card">'
        +'<div class="bm-av" style="background:'+avColor(bm.name)+'">'+initials(bm.name)+'</div>'
        +'<div><div class="bm-name">'+esc(bm.name)+'</div><div class="bm-email">'+esc(bm.email)+'</div></div>'
        +'<div class="bm-right"><button class="btn-remove" onclick="removeBM(\''+bm.id+'\',\''+esc(bm.name)+'\')">Remove</button></div>'
      +'</div>').join('');
  document.getElementById('main').innerHTML=`
    <div class="section-label"><span class="section-dot" style="background:var(--navy)"></span>Add BM</div>
    <div class="add-bm-wrap">
      <div class="form-err" id="bmErr"></div>
      <input id="bmName" type="text" placeholder="Full name"/>
      <input id="bmEmail" type="email" placeholder="bm@materialdepot.com" inputmode="email" style="margin-top:10px"/>
      <button class="btn-sm" style="width:100%;margin-top:10px" onclick="addBM()">Add Business Manager</button>
    </div>
    <div class="section-label"><span class="section-dot" style="background:var(--blue)"></span>Team (${teamBMs.length})</div>
    ${bmHtml}`;
}

async function addBM(){
  const err=document.getElementById('bmErr');err.classList.remove('show');
  const name=(document.getElementById('bmName').value||'').trim();
  const email=(document.getElementById('bmEmail').value||'').trim().toLowerCase();
  if(!name){err.textContent='Enter the BM\'s full name.';err.classList.add('show');return;}
  if(!email.endsWith('@materialdepot.com')){err.textContent='Use a @materialdepot.com email.';err.classList.add('show');return;}
  const existing=await sbGet('profiles?email=eq.'+encodeURIComponent(email)+'&select=id,role');
  if(Array.isArray(existing)&&existing.length){err.textContent='This email already has an account.';err.classList.add('show');return;}
  try{
    await sbPost('profiles',{name,email,role:'store_bm',store_id:SESSION.store_id,passcode:null});
    toast(name+' added as BM');
    document.getElementById('bmName').value='';
    document.getElementById('bmEmail').value='';
    loadTeam();
  }catch(e){err.textContent='Failed to add BM — check connection.';err.classList.add('show');}
}

async function removeBM(id,name){
  if(!confirm('Remove '+name+' from your team? Their account will be deleted.'))return;
  try{await sbDel('profiles',id);toast(name+' removed');loadTeam();}
  catch(e){toast('Failed to remove — try again',true);}
}

// ── Init ─────────────────────────────────────────────────────────
SESSION=getSession();
if(SESSION){
  document.getElementById('userPill').textContent=SESSION.name;
  loadData();
}
</script>
